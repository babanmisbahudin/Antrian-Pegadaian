version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: antrian_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: antrian_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./antrian-backend
    container_name: antrian_backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/antrian_db
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_min_32_chars}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "5000:5000"
    volumes:
      - ./antrian-backend/uploads:/app/uploads

  frontend:
    build: ./antrian-frontend
    container_name: antrian_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo_data:
